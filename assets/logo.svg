<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#07070d"/>

  <!-- Main rounded square -->
  <rect x="96" y="96" width="320" height="320" rx="64" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <rect x="96" y="96" width="320" height="320" rx="64" fill="url(#shine)"/>

  <!-- Letter F -->
  <text x="256" y="310" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif" font-size="220" font-weight="700" fill="white" letter-spacing="-8">F</text>

  <!-- Subtle dot accent (AI node) -->
  <circle cx="340" cy="172" r="12" fill="rgba(255,255,255,0.6)"/>
  <circle cx="340" cy="172" r="6" fill="white"/>
</svg>
